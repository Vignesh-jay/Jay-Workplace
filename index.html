<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jay Workplace</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    JW
                </div>
                <div class="logo-text">
                    <h4>Jay Workplace</h4>
                    <span>Asset Management</span>
                </div>

            </div>
        </div>

        <ul class="nav-menu">
            
            <li id="nav-dashboard" onclick="loadDashboard()">
                <i class="fas fa-home"></i>
                Dashboard
            </li>
            <li id="nav-workforce" onclick="loadWorkforce()">
                <i class="fas fa-users"></i>
                Workforce
            </li>
            <li id="nav-assets" onclick="loadAssets()">
                <i class="fas fa-laptop"></i>
                Assets
            </li>
            <li id="nav-assignments" onclick="loadAssignments()">
                <i class="fas fa-right-left"></i>
                Assignments
            </li>
            <li id="nav-reports" onclick="loadReports()">
                <i class="fas fa-chart-column"></i>
                Reports
            </li>
            <li id="nav-administration" onclick="loadAdministration()">
                <i class="fas fa-gear"></i>
                Administration
            </li>
        </ul>
    </aside>

    <!-- Main Area -->
    <main class="main-content">

        <header class="topbar">
            <input type="text" placeholder="Search..." class="search-box">

            <div class="user-profile">

    <div class="avatar">A</div>

    <div class="user-details">
        <div class="user-name">Admin User</div>
        <div class="user-role">Administrator</div>
    </div>

    <i class="fas fa-chevron-down"></i>

</div>
        </header>

        <div id="content">

        </div>

    </main>

</div>

<script src="js/asset.service.js"></script>
<script src="js/store.js"></script>
<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>
<script src="js/workforce.js"></script>
<script src="js/assets.js"></script>
<script src="js/assignments.js"></script>
<script src="js/reports.js"></script>
<script src="js/administration.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
